spring:
  application:
    name: boutique-service
  config:
    import: optional:configserver:http://localhost:8888

server:
  port: 8081

# Eureka
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    root: INFO
    org.springframework.cloud.netflix.eureka: DEBUG
